<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sponsored by Modal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 40px;
        }

        .logo-container {
            margin-bottom: 80px;
            text-align: center;
        }

        .modal-logo {
            max-width: 600px;
            width: 100%;
            height: auto;
        }

        .link {
            font-size: 4rem;
            font-weight: 600;
            color: #FFFFFF;
            letter-spacing: -0.01em;
        }

        @media (max-width: 1200px) {
            .modal-logo {
                font-size: 6rem;
            }
            .link {
                font-size: 3rem;
            }
        }

        @media (max-width: 768px) {
            .modal-logo {
                font-size: 4rem;
            }
            .link {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="modal-logo.png" alt="Modal" class="modal-logo">
    </div>
    <div class="link">modal.com/dancleary</div>
</body>
</html>
